<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grafik — ATM HMSI</title>
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #E8C96A;
      --deep: #080A0F;
      --surface: #0E1118;
      --surface-2: #141820;
      --text-1: #F0EDE8;
      --text-2: #8A8D95;
      --text-3: #4A4D57;
      --border: rgba(201, 168, 76, .18);
      --border-hi: rgba(201, 168, 76, .45);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--deep);
      color: var(--text-1);
      font-family: 'DM Sans', Arial, sans-serif;
      font-size: 13px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
    }

    .page-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(201, 168, 76, .12);
      border: 1px solid var(--border-hi);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .page-icon svg {
      width: 16px;
      height: 16px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .page-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: .06em;
      color: var(--text-1);
    }

    .page-sub {
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 2px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gold);
      animation: blink 2s ease-in-out infinite;
    }

    .status-dot.offline {
      background: #E05252;
      animation: none;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: .4;
        transform: scale(.7);
      }
    }

    .status-txt {
      color: var(--text-3);
    }

    .embed-wrap {
      position: relative;
      width: 100%;
      min-height: 400px;
    }

    .embed-skeleton {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: var(--surface);
      z-index: 2;
      transition: opacity .4s;
    }

    .embed-skeleton.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .sk-rings {
      position: relative;
      width: 36px;
      height: 36px;
    }

    .sk-rings span {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--gold);
      animation: spin 1.1s linear infinite;
    }

    .sk-rings span:nth-child(2) {
      inset: 7px;
      border-top-color: var(--gold-light);
      animation-duration: .75s;
      animation-direction: reverse;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .sk-txt {
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .offline-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 320px;
      padding: 32px 24px;
      gap: 14px;
      text-align: center;
    }

    .offline-state.show {
      display: flex;
    }

    .offline-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }

    .offline-icon svg {
      width: 24px;
      height: 24px;
      stroke: var(--text-3);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .offline-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--text-2);
      letter-spacing: .04em;
    }

    .offline-desc {
      font-size: 12px;
      color: var(--text-3);
      line-height: 1.7;
      max-width: 260px;
    }

    .retry-btn {
      margin-top: 8px;
      background: transparent;
      border: 1px solid var(--border-hi);
      border-radius: 100px;
      padding: 8px 22px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--gold);
      cursor: pointer;
      transition: background .2s, border-color .2s;
    }

    .retry-btn:hover {
      background: rgba(201, 168, 76, .08);
      border-color: var(--gold);
    }

    #gas-frame {
      display: block;
      width: 100%;
      min-height: 400px;
      border: none;
      background: transparent;
      position: relative;
      z-index: 1;
    }

    .ornament {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
    }

    .orn-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .orn-dia {
      width: 4px;
      height: 4px;
      background: var(--gold);
      transform: rotate(45deg);
      opacity: .4;
    }

    .orn-txt {
      font-size: 9px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--text-3);
    }
  </style>
</head>

<body>

  <div class="page-header">
    <div class="page-icon">
      <svg viewBox="0 0 24 24">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
      </svg>
    </div>
    <div>
      <div class="page-title">Grafik ATM</div>
      <div class="page-sub">HINO CHASIS HMSI</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-txt" id="statusTxt">Menghubungkan ke server…</span>
  </div>

  <div class="embed-wrap">
    <div class="embed-skeleton" id="skeleton">
      <div class="sk-rings"><span></span><span></span></div>
      <span class="sk-txt">Memuat grafik…</span>
    </div>
    <div class="offline-state" id="offlineState">
      <div class="offline-icon">
        <svg viewBox="0 0 24 24">
          <line x1="1" y1="1" x2="23" y2="23" />
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
          <line x1="12" y1="20" x2="12.01" y2="20" />
        </svg>
      </div>
      <div class="offline-title">Tidak Ada Koneksi</div>
      <div class="offline-desc">Grafik memerlukan koneksi internet karena data diambil langsung dari server. Periksa koneksi lalu coba lagi.</div>
      <button class="retry-btn" onclick="retryLoad()">↺ &nbsp;Coba Lagi</button>
    </div>
    <iframe id="gas-frame" src="" data-src="https://script.google.com/macros/s/AKfycbyxN8LksN0C8qgsbPoVQ4-XS_nqw4R8bDBNAle5fUS574vtlqWH8LD2OpiAWuBAfoA8/exec" scrolling="yes" allow="autoplay" title="Grafik Armada"></iframe>
  </div>

  <div class="ornament">
    <div class="orn-line"></div>
    <span class="orn-txt">Sumber: Database sdedyatm</span>
    <div class="orn-dia"></div>
    <div class="orn-line"></div>
  </div>

  <script>
    const frame = document.getElementById('gas-frame');
    const skeleton = document.getElementById('skeleton');
    const offline = document.getElementById('offlineState');
    const statusDot = document.getElementById('statusDot');
    const statusTxt = document.getElementById('statusTxt');
    const GAS_URL = frame.dataset.src;
    let loadTimeout;

    function startLoad() {
      if (!navigator.onLine) {
        showOffline();
        return;
      }
      skeleton.classList.remove('hidden');
      offline.classList.remove('show');
      frame.style.height = '0px';
      setStatus('loading', 'Memuat data grafik…');
      frame.src = GAS_URL;
      loadTimeout = setTimeout(() => {
        if (!navigator.onLine) {
          showOffline();
        } else {
          setStatus('online', 'Data dimuat');
          skeleton.classList.add('hidden');
          frame.style.height = '500px';
        }
      }, 15000);
    }
    frame.addEventListener('load', () => {
      clearTimeout(loadTimeout);
      skeleton.classList.add('hidden');
      offline.classList.remove('show');
      setStatus('online', 'Data berhasil dimuat');
      try {
        const h = frame.contentDocument?.body?.scrollHeight;
        frame.style.height = (h && h > 100 ? h : 500) + 'px';
      } catch (_) {
        frame.style.height = '600px';
      }
    });
    frame.addEventListener('error', () => {
      clearTimeout(loadTimeout);
      showOffline();
    });
    window.addEventListener('offline', showOffline);
    window.addEventListener('online', () => {
      if (offline.classList.contains('show')) retryLoad();
    });

    function showOffline() {
      clearTimeout(loadTimeout);
      skeleton.classList.add('hidden');
      offline.classList.add('show');
      frame.style.height = '0px';
      setStatus('offline', 'Tidak ada koneksi internet');
    }

    function setStatus(state, msg) {
      statusTxt.textContent = msg;
      statusDot.className = 'status-dot' + (state === 'offline' ? ' offline' : '');
    }

    function retryLoad() {
      startLoad();
    }
    startLoad();
  </script>
</body>

</html>
