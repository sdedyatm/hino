<!--
  grafik.html — fragmen HTML murni (tanpa DOCTYPE/html/head/body)
  GAS embed langsung, tanpa modifikasi tampilan
-->
<style>
  .grf-wrap {
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
    box-sizing: border-box;
    padding: 0;
    margin: 0;
  }

  .grf-shell {
    position: relative;
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(201, 168, 76, 0.18);
  }

  /* Loading overlay */
  .grf-loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: #0E1118;
    z-index: 5;
    border-radius: 12px;
    transition: opacity .45s ease, visibility .45s ease;
  }

  .grf-loading.out {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .grf-ring {
    position: relative;
    width: 36px;
    height: 36px;
  }

  .grf-ring::before,
  .grf-ring::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid transparent;
  }

  .grf-ring::before {
    inset: 0;
    border-top-color: #C9A84C;
    animation: grf-spin 1.1s linear infinite;
  }

  .grf-ring::after {
    inset: 7px;
    border-top-color: #E8C96A;
    animation: grf-spin .8s linear infinite reverse;
  }

  @keyframes grf-spin {
    to {
      transform: rotate(360deg);
    }
  }

  .grf-loading-txt {
    font-size: 10px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: #4A4D57;
    font-family: 'DM Sans', sans-serif;
  }

  /* Error */
  .grf-error {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    gap: 10px;
    background: #0E1118;
    border-radius: 12px;
    text-align: center;
    font-family: 'DM Sans', sans-serif;
  }

  .grf-error.show {
    display: flex;
  }

  .grf-error-ico {
    font-size: 26px;
    opacity: .35;
  }

  .grf-error-txt {
    font-size: 12px;
    color: #4A4D57;
    line-height: 1.6;
  }

  .grf-retry {
    padding: 8px 20px;
    background: transparent;
    border: 1px solid rgba(201, 168, 76, 0.55);
    border-radius: 8px;
    color: #E8C96A;
    font-size: 11px;
    letter-spacing: .1em;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  /* Iframe — tampil apa adanya, tanpa filter */
  .grf-iframe {
    display: block;
    width: 100%;
    border: none;
    min-height: 480px;
    height: 76vh;
    max-height: 720px;
    opacity: 0;
    transition: opacity .5s ease;
    background: transparent;
  }

  .grf-iframe.visible {
    opacity: 1;
  }
</style>

<div class="grf-wrap">
  <div class="grf-shell" id="grfShell">

    <div class="grf-loading" id="grfLoading">
      <div class="grf-ring"></div>
      <span class="grf-loading-txt">Memuat Data…</span>
    </div>

    <div class="grf-error" id="grfError">
      <div class="grf-error-ico">📊</div>
      <div class="grf-error-txt">Gagal memuat THR to THR.<br>Periksa koneksi internet Anda.</div>
      <button class="grf-retry" onclick="grfLoad()">↻ Muat Ulang</button>
    </div>

    <iframe id="grfIframe" class="grf-iframe" src="" title="THR to THR" loading="lazy" allowfullscreen></iframe>

  </div>
</div>

<script>
  (function() {
    const GAS = 'https://script.google.com/macros/s/AKfycby9rwR_3uN3-pujGA_-dVpAhX54mmN2Gabj8w59049MzP2Ia_B_qzqr-SzrViT7EeMHNQ/exec';
    const iframe = document.getElementById('grfIframe');
    const loading = document.getElementById('grfLoading');
    const errBox = document.getElementById('grfError');
    const shell = document.getElementById('grfShell');
    let timer = null;

    function resizeIframe() {
      const vH = window.innerHeight || 640;
      const h = Math.min(720, Math.max(480, Math.round(vH * 0.76)));
      iframe.style.height = h + 'px';
      shell.style.height = h + 'px';
    }

    function grfLoad() {
      errBox.classList.remove('show');
      loading.classList.remove('out');
      iframe.classList.remove('visible');
      iframe.src = '';
      clearTimeout(timer);
      timer = setTimeout(() => {
        loading.classList.add('out');
        errBox.classList.add('show');
      }, 22000);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          iframe.src = GAS;
        });
      });
    }
    iframe.addEventListener('load', function() {
      clearTimeout(timer);
      loading.classList.add('out');
      errBox.classList.remove('show');
      iframe.classList.add('visible');
      resizeIframe();
      if (window.ResizeObserver) {
        new ResizeObserver(resizeIframe).observe(shell);
      }
    });
    window.grfLoad = grfLoad;
    grfLoad();
  })();
</script>
